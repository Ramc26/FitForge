<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitForge | Multi-Protocol</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a" id="themeColorMeta">
    <link rel="apple-touch-icon" href="Personality.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="FitForge: Daily workout tracker and fitness protocol.">
    <link rel="icon" type="image/svg+xml" href="Personality.svg">

    <link
        href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Poppins:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* =========================================
           1. SHARED CORE VARIABLES & LAYOUT
           ========================================= */
        :root {
            /* Default: Flat Dark Theme */
            --bg-color: #0a0a0a;
            --card-bg: #161616;
            --header-bg: rgba(10, 10, 10, 0.85);
            --accent-main: #00ff88;
            --accent-secondary: #eab308;
            --text-main: #ffffff;
            --text-muted: #eab308;
            --border-color: #222;

            --radius-card: 16px;
            --radius-btn: 8px;
            --radius-bubble: 50%;

            --border-card: 1px solid var(--border-color);
            --border-bubble: 2px solid #333;

            --shadow-card: none;
            --shadow-bubble: none;
            --shadow-btn: none;

            --font-primary: 'Poppins', sans-serif;
            --font-header: 'Syncopate', sans-serif;
            --font-secondary: 'Poppins', sans-serif;
            /* Changes to mono in brutalism */
        }

        .text-muted {
            color: var(--text-muted) !important;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-primary);
            padding-bottom: 90px;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s, color 0.3s;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        .brand-font {
            font-family: var(--font-header);
            text-transform: uppercase;
            font-weight: 700;
        }

        /* Generic Layout Classes */
        .dashboard-header {
            padding: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: var(--header-bg);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            border-bottom: var(--border-card);
        }

        .btn-action {
            background: var(--card-bg);
            color: var(--text-main);
            border: var(--border-card);
            border-radius: var(--radius-btn);
            font-size: 0.9rem;
            padding: 6px 12px;
            box-shadow: var(--shadow-btn);
            transition: all 0.2s;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .workout-card {
            background: var(--card-bg);
            border-radius: var(--radius-card);
            border: var(--border-card);
            box-shadow: var(--shadow-card);
            margin-bottom: 15px;
            padding: 20px;
            transition: all 0.3s;
        }

        .ex-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .ex-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
        }

        .set-container {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .set-bubble {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-bubble);
            border: var(--border-bubble);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            background: var(--card-bg);
            color: var(--text-muted);
            box-shadow: var(--shadow-bubble);
            transition: all 0.2s;
            font-family: var(--font-secondary);
        }

        .finisher-label {
            display: flex;
            align-items: center;
            width: 100%;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .finisher-checkbox {
            width: 1.8em;
            height: 1.8em;
            background: var(--card-bg);
            border: var(--border-bubble);
            border-radius: var(--radius-btn);
            margin-right: 15px;
            appearance: none;
            cursor: pointer;
            box-shadow: var(--shadow-bubble);
            transition: all 0.2s;
        }

        .finisher-checkbox:checked {
            position: relative;
        }

        .finisher-checkbox:checked::after {
            content: '✓';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .anatomy-toggle {
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 15px;
            display: inline-flex;
            align-items: center;
            font-weight: 700;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .anatomy-content {
            display: none;
            font-size: 0.85rem;
            margin-top: 10px;
            padding: 12px;
            line-height: 1.6;
        }

        .machine-alt {
            font-size: 0.85rem;
            margin-top: 15px;
            display: block;
            font-weight: 700;
            text-transform: uppercase;
        }

        .progress-wrapper {
            margin-bottom: 30px;
        }

        .progress {
            height: 12px;
            border-radius: var(--radius-btn);
            overflow: visible;
            transition: all 0.3s;
        }

        .progress-bar {
            border-radius: var(--radius-btn);
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .media-card {
            border-radius: var(--radius-card);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            width: 100%;
            border: var(--border-card);
            box-shadow: var(--shadow-card);
            transition: all 0.2s;
            text-transform: uppercase;
        }

        #floatingTimer {
            position: fixed;
            bottom: 85px;
            left: 50%;
            transform: translateX(-50%) translateY(200%);
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1.5rem;
            z-index: 999;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-family: var(--font-secondary);
        }

        #floatingTimer.show {
            transform: translateX(-50%) translateY(0);
        }

        .modal-content {
            background: var(--card-bg);
            color: var(--text-main);
            border: var(--border-card);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
        }

        .modal-header {
            border-bottom: var(--border-card);
        }

        .audio-list-item {
            display: flex;
            align-items: center;
            text-decoration: none;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: var(--radius-btn);
            transition: all 0.2s;
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 15px 0;
            text-align: center;
            font-size: 0.85rem;
            z-index: 1000;
            background: var(--header-bg);
            border-top: var(--border-card);
            backdrop-filter: blur(10px);
        }

        .footer-avatar {
            width: 24px;
            height: 24px;
            vertical-align: middle;
            margin-right: 8px;
            border-radius: 50%;
        }

        /* Dropdown overrides */
        .dropdown-menu {
            border-radius: var(--radius-btn);
            box-shadow: var(--shadow-card);
            padding: 8px;
            min-width: 150px;
        }

        .dropdown-item {
            border-radius: 4px;
            padding: 8px 15px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 2px;
        }

        /* =========================================
           2. THEME: FLAT DARK (Default Overrides)
           ========================================= */
        .brand-logo {
            background: linear-gradient(-45deg, #cb4154, #eab308, #ffffff, #00ff88);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: waveFlow 8s ease infinite;
        }

        .btn-action:hover,
        .btn-action.active,
        #voiceToggle.active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--accent-main);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .workout-card.completed-card {
            border-color: rgba(0, 255, 136, 0.3);
            background: rgba(0, 255, 136, 0.02);
        }

        .set-bubble.active {
            background: var(--accent-main);
            border-color: var(--accent-main);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
            transform: scale(1.1);
        }

        .finisher-checkbox:checked {
            background: var(--accent-main);
            border-color: var(--accent-main);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        .finisher-checkbox:checked::after {
            color: #000;
            font-weight: 900;
        }

        .anatomy-toggle {
            background: rgba(0, 255, 136, 0.1);
            color: var(--accent-main);
            padding: 6px 12px;
            border-radius: 6px;
        }

        .anatomy-content {
            background: #111;
            border-left: 3px solid var(--accent-main);
            border-radius: 0 8px 8px 0;
            color: #ccc;
        }

        .machine-alt {
            color: var(--accent-secondary);
        }

        .opt-badge {
            background: #333 !important;
            color: #fff !important;
        }

        .progress {
            background: #222;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        .progress-bar {
            background: var(--accent-main);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        .progress-wrapper.is-complete .progress-bar {
            background: var(--accent-secondary);
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.5);
        }

        .progress-wrapper.is-complete #progressText {
            color: #fff !important;
        }

        .progress-wrapper #progressText {
            color: var(--accent-secondary);
        }

        .media-card {
            background: #111;
            color: #fff;
        }

        .media-card.spotify {
            background: linear-gradient(135deg, #1db954, #128238);
        }

        .media-card.podcast {
            background: linear-gradient(135deg, #8e44ad, #5e2a75);
        }

        #floatingTimer {
            background: #222;
            border: 2px solid var(--accent-main);
            color: #fff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        #floatingTimer.done {
            background: var(--accent-main);
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.8);
        }

        .audio-list-item {
            background: #222;
            border: 1px solid #333;
            color: #fff;
        }

        footer a {
            color: var(--accent-main);
        }

        .btn-close {
            filter: invert(1) grayscale(100%) brightness(200%);
        }

        .dropdown-menu {
            background: #161616;
            border-color: #333 !important;
        }

        .dropdown-item {
            color: #fff;
        }

        .dropdown-item:hover,
        .dropdown-item.active {
            background: #222;
            color: var(--accent-main);
        }

        /* =========================================
           3. THEME: WHITE CLAYMORPHISM
           ========================================= */
        [data-theme="clay"] {
            --bg-color: #e0e5ec;
            --card-bg: #e0e5ec;
            --header-bg: rgba(224, 229, 236, 0.85);
            --accent-main: #00c853;
            --accent-secondary: #eab308;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --border-color: transparent;
            --radius-card: 24px;
            --radius-btn: 12px;

            --clay-out: 8px 8px 16px rgba(163, 177, 198, 0.6), -8px -8px 16px rgba(255, 255, 255, 0.8);
            --clay-in: inset 4px 4px 8px rgba(255, 255, 255, 0.8), inset -4px -4px 8px rgba(163, 177, 198, 0.6);
            --clay-pressed: inset 6px 6px 12px rgba(163, 177, 198, 0.7), inset -6px -6px 12px rgba(255, 255, 255, 0.9);
            --clay-active-in: inset 4px 4px 8px rgba(255, 255, 255, 0.5), inset -4px -4px 8px rgba(0, 0, 0, 0.1);

            --shadow-card: var(--clay-out), var(--clay-in);
            --shadow-btn: var(--clay-out), var(--clay-in);
            --shadow-bubble: var(--clay-out), var(--clay-in);
        }

        [data-theme="clay"] .brand-logo {
            background: linear-gradient(-45deg, #eab308, #3498db, #00c853, #cb4154);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 2px 3px rgba(163, 177, 198, 0.5));
        }

        [data-theme="clay"] .btn-action:active,
        [data-theme="clay"] .btn-action.active {
            box-shadow: var(--clay-pressed);
            color: var(--accent-main);
            transform: scale(0.95);
        }

        [data-theme="clay"] #voiceToggle.active {
            box-shadow: var(--clay-pressed);
            color: var(--accent-main);
            text-shadow: 0 0 5px rgba(0, 200, 83, 0.5);
        }

        [data-theme="clay"] .workout-card.completed-card {
            background: #d1d9e6;
            box-shadow: var(--clay-pressed);
        }

        [data-theme="clay"] .badge.bg-dark {
            background: #d1d9e6 !important;
            color: var(--text-main) !important;
            box-shadow: var(--clay-pressed);
            border: none !important;
        }

        [data-theme="clay"] .opt-badge {
            box-shadow: none;
            background: transparent !important;
            border: 1px solid var(--text-muted) !important;
        }

        [data-theme="clay"] .set-bubble {
            background: var(--card-bg);
            border: none;
        }

        [data-theme="clay"] .set-bubble.active {
            box-shadow: var(--clay-out), var(--clay-active-in);
            background: var(--accent-main);
            color: #fff;
        }

        [data-theme="clay"] .finisher-checkbox {
            background: var(--card-bg);
            border: none;
        }

        [data-theme="clay"] .finisher-checkbox:checked {
            box-shadow: var(--clay-pressed), 0 0 15px rgba(0, 200, 83, 0.4);
            background: var(--accent-main);
        }

        [data-theme="clay"] .finisher-checkbox:checked::after {
            color: #fff;
            font-weight: 900;
        }

        [data-theme="clay"] .anatomy-toggle {
            background: #d1d9e6;
            box-shadow: var(--clay-pressed);
            color: var(--accent-main);
            padding: 8px 14px;
            border-radius: 12px;
        }

        [data-theme="clay"] .anatomy-content {
            background: #d1d9e6;
            box-shadow: var(--clay-pressed);
            border-radius: 16px;
            border-left: 4px solid var(--accent-main);
            color: var(--text-muted);
        }

        [data-theme="clay"] .machine-alt {
            color: #d35400;
        }

        [data-theme="clay"] .progress {
            background: #d1d9e6;
            box-shadow: var(--clay-pressed);
            height: 16px;
            border-radius: 20px;
        }

        [data-theme="clay"] .progress-bar {
            box-shadow: var(--clay-active-in);
            border-radius: 20px;
            background: var(--accent-main);
        }

        [data-theme="clay"] .progress-wrapper.is-complete .progress-bar {
            background: var(--accent-secondary);
            box-shadow: var(--clay-active-in), 0 0 15px rgba(234, 179, 8, 0.4);
        }

        [data-theme="clay"] .progress-wrapper #progressText {
            color: var(--accent-main);
        }

        [data-theme="clay"] .progress-wrapper.is-complete #progressText {
            color: var(--accent-secondary) !important;
        }

        [data-theme="clay"] .media-card {
            box-shadow: var(--clay-out), inset 4px 4px 8px rgba(255, 255, 255, 0.2), inset -4px -4px 8px rgba(0, 0, 0, 0.1);
            color: #fff !important;
        }

        [data-theme="clay"] .media-card:active {
            box-shadow: var(--clay-pressed);
        }

        [data-theme="clay"] #floatingTimer {
            background: var(--card-bg);
            box-shadow: 0 15px 35px rgba(163, 177, 198, 0.8), var(--clay-in);
            color: var(--text-main);
            border: none;
        }

        [data-theme="clay"] #floatingTimer.done {
            background: var(--accent-main);
            box-shadow: 0 10px 40px rgba(0, 200, 83, 0.5), var(--clay-active-in);
            color: #fff;
        }

        [data-theme="clay"] .audio-list-item {
            background: #d1d9e6;
            box-shadow: var(--clay-pressed);
            color: var(--text-main);
            border: none;
        }

        [data-theme="clay"] footer a {
            color: var(--accent-main);
        }

        [data-theme="clay"] .btn-close {
            filter: none;
        }

        [data-theme="clay"] .dropdown-menu {
            background: var(--card-bg);
            box-shadow: var(--clay-out);
            border: none !important;
        }

        [data-theme="clay"] .dropdown-item {
            color: var(--text-main);
        }

        [data-theme="clay"] .dropdown-item:hover,
        [data-theme="clay"] .dropdown-item.active {
            background: #d1d9e6;
            color: var(--accent-main);
            box-shadow: var(--clay-pressed);
        }

        /* =========================================
           4. THEME: NEO BRUTALISM
           ========================================= */
        [data-theme="brutal"] {
            --bg-color: #f4f0ea;
            --card-bg: #ffffff;
            --header-bg: #ffffff;
            --accent-main: #00e676;
            --accent-secondary: #ffd600;
            --text-main: #000000;
            --text-muted: #000000;
            --border-color: #000;
            --radius-card: 8px;
            --radius-btn: 4px;
            --radius-bubble: 4px;

            --border-card: 4px solid #000;
            --border-bubble: 2px solid #000;
            --shadow-card: 6px 6px 0px #000;
            --shadow-btn: 4px 4px 0px #000;
            --shadow-bubble: 4px 4px 0px #000;
            --font-secondary: 'Space Mono', monospace;
        }

        [data-theme="brutal"] body {
            background-image: radial-gradient(#000 1px, transparent 1px);
            background-size: 20px 20px;
        }

        [data-theme="brutal"] .brand-logo {
            background: none;
            color: #000;
            text-shadow: 3px 3px 0px var(--accent-main), 6px 6px 0px #000;
            -webkit-text-fill-color: #000;
            animation: none;
            filter: none;
        }

        [data-theme="brutal"] .btn-action {
            font-weight: 800;
            border: 2px solid #000;
        }

        [data-theme="brutal"] .btn-action:active,
        [data-theme="brutal"] .btn-action.active,
        [data-theme="brutal"] #voiceToggle.active {
            transform: translate(4px, 4px);
            box-shadow: 0 0 0 #000;
            background: var(--accent-secondary);
            color: #000;
        }

        [data-theme="brutal"] .workout-card.completed-card {
            background: var(--accent-main);
        }

        [data-theme="brutal"] .ex-header {
            border-bottom: 2px dashed #000;
            padding-bottom: 10px;
        }

        [data-theme="brutal"] .badge.bg-dark {
            background: #000 !important;
            color: #fff !important;
            border-radius: 0;
            font-family: var(--font-secondary);
            border: 2px solid #000;
            box-shadow: 2px 2px 0px var(--accent-secondary);
        }

        [data-theme="brutal"] .opt-badge {
            background: var(--accent-secondary) !important;
            color: #000 !important;
            box-shadow: none;
        }

        [data-theme="brutal"] .set-bubble {
            background: #fff;
            color: #000;
        }

        [data-theme="brutal"] .set-bubble.active {
            background: var(--accent-secondary);
            transform: translate(4px, 4px);
            box-shadow: 0 0 0 #000;
            color: #000;
        }

        [data-theme="brutal"] .finisher-checkbox {
            background: #fff;
        }

        [data-theme="brutal"] .finisher-checkbox:checked {
            background: #ff5252;
            transform: translate(4px, 4px);
            box-shadow: 0 0 0 #000;
        }

        [data-theme="brutal"] .finisher-checkbox:checked::after {
            content: 'X';
            font-size: 1.5rem;
            color: #000;
        }

        [data-theme="brutal"] .anatomy-toggle {
            background: #fff;
            border: 2px solid #000;
            box-shadow: 2px 2px 0 #000;
            padding: 6px 12px;
            color: #000;
            border-radius: 0;
        }

        [data-theme="brutal"] .anatomy-toggle:active {
            transform: translate(2px, 2px);
            box-shadow: 0 0 0 #000;
        }

        [data-theme="brutal"] .anatomy-content {
            background: #fff;
            border: 2px solid #000;
            border-left: 8px solid #448aff;
            border-radius: 0;
            color: #000;
            font-family: var(--font-secondary);
        }

        [data-theme="brutal"] .machine-alt {
            background: var(--accent-secondary);
            padding: 5px 10px;
            border: 2px solid #000;
            display: inline-block;
            color: #000;
        }

        [data-theme="brutal"] .progress {
            background: #fff;
            border: 4px solid #000;
            box-shadow: 4px 4px 0 #000;
            border-radius: 0;
            height: 24px;
        }

        [data-theme="brutal"] .progress-bar {
            background: var(--accent-main);
            border-right: 4px solid #000;
            border-radius: 0;
        }

        [data-theme="brutal"] .progress-wrapper.is-complete .progress-bar {
            background: var(--accent-secondary);
        }

        [data-theme="brutal"] .progress-wrapper #progressText {
            background: var(--accent-secondary);
            padding: 0 8px;
            border: 2px solid #000;
            color: #000;
        }

        [data-theme="brutal"] .progress-wrapper.is-complete #progressText {
            background: var(--accent-main);
        }

        [data-theme="brutal"] .media-card {
            border-radius: 0;
            color: #000 !important;
        }

        [data-theme="brutal"] .media-card.spotify {
            background: var(--accent-main);
        }

        [data-theme="brutal"] .media-card.podcast {
            background: #448aff;
        }

        [data-theme="brutal"] .media-card:active {
            transform: translate(6px, 6px);
            box-shadow: 0 0 0 #000;
        }

        [data-theme="brutal"] #floatingTimer {
            background: var(--accent-secondary);
            border: 4px solid #000;
            color: #000;
            box-shadow: 8px 8px 0 #000;
            border-radius: 0;
        }

        [data-theme="brutal"] #floatingTimer.done {
            background: #ff5252;
            color: #fff;
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% {
                transform: translateX(-50%) rotate(0);
            }

            25% {
                transform: translateX(-52%) rotate(-2deg);
            }

            50% {
                transform: translateX(-50%) rotate(0);
            }

            75% {
                transform: translateX(-48%) rotate(2deg);
            }

            100% {
                transform: translateX(-50%) rotate(0);
            }
        }

        [data-theme="brutal"] .audio-list-item {
            background: #fff;
            border: 2px solid #000;
            box-shadow: 3px 3px 0 #000;
            color: #000;
            border-radius: 0;
        }

        [data-theme="brutal"] .audio-list-item:active {
            transform: translate(3px, 3px);
            box-shadow: 0 0 0 #000;
            background: var(--accent-main);
        }

        [data-theme="brutal"] footer a {
            color: #448aff;
        }

        [data-theme="brutal"] .btn-close {
            filter: none;
        }

        [data-theme="brutal"] .dropdown-menu {
            background: #fff;
            border: 4px solid #000 !important;
            border-radius: 0;
            box-shadow: 6px 6px 0 #000;
        }

        [data-theme="brutal"] .dropdown-item {
            color: #000;
            border-bottom: 2px solid #000;
            border-radius: 0;
        }

        [data-theme="brutal"] .dropdown-item:hover {
            background: var(--accent-main);
        }

        /* =========================================
           5. THEME: MINIMALISM
           ========================================= */
        [data-theme="minimal"] {
            --bg-color: #fcfcfc;
            --card-bg: #ffffff;
            --header-bg: rgba(252, 252, 252, 0.95);
            --accent-main: #000000;
            --accent-secondary: #000000;
            --text-main: #111111;
            --text-muted: #737373;
            --border-color: #e5e5e5;
            --radius-card: 0px;
            --radius-btn: 0px;
            --radius-bubble: 0px;

            --border-card: 1px solid var(--border-color);
            --border-bubble: 1px solid var(--border-color);
            --shadow-card: none;
            --shadow-btn: none;
            --shadow-bubble: none;
        }

        [data-theme="minimal"] h1,
        [data-theme="minimal"] h2,
        [data-theme="minimal"] h3,
        [data-theme="minimal"] .brand-font {
            letter-spacing: -0.5px;
        }

        [data-theme="minimal"] .brand-logo {
            background: none;
            color: #000;
            -webkit-text-fill-color: #000;
            animation: none;
            filter: none;
            letter-spacing: 2px;
        }

        [data-theme="minimal"] .btn-action {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-main);
            padding: 6px 12px;
        }

        [data-theme="minimal"] .btn-action:hover,
        [data-theme="minimal"] .btn-action.active,
        [data-theme="minimal"] #voiceToggle.active {
            border-color: var(--border-color);
            background: #f9f9f9;
            color: #000;
        }

        [data-theme="minimal"] .workout-card.completed-card {
            background: #fafafa;
            opacity: 0.6;
        }

        [data-theme="minimal"] .badge.bg-dark {
            background: #fff !important;
            color: #000 !important;
            border: 1px solid #000 !important;
        }

        [data-theme="minimal"] .opt-badge {
            background: #f0f0f0 !important;
            color: #777 !important;
            border: none !important;
        }

        [data-theme="minimal"] .set-bubble {
            background: #fff;
            color: var(--text-muted);
        }

        [data-theme="minimal"] .set-bubble.active {
            background: #000;
            border-color: #000;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.1);
        }

        [data-theme="minimal"] .finisher-checkbox {
            background: #fff;
            border: 1px solid #000;
        }

        [data-theme="minimal"] .finisher-checkbox:checked {
            background: #000;
            border-color: #000;
        }

        [data-theme="minimal"] .anatomy-toggle {
            background: transparent;
            color: var(--text-muted);
            border-bottom: 1px dashed var(--text-muted);
            padding: 0;
            border-radius: 0;
        }

        [data-theme="minimal"] .anatomy-toggle:hover {
            color: #000;
            border-color: #000;
        }

        [data-theme="minimal"] .anatomy-content {
            background: transparent;
            border-left: 2px solid #000;
            border-radius: 0;
            padding: 0 0 0 15px;
            color: var(--text-muted);
        }

        [data-theme="minimal"] .machine-alt {
            color: var(--text-muted);
            font-family: monospace;
        }

        [data-theme="minimal"] .progress {
            background: var(--border-color);
            height: 4px;
            border-radius: 0;
        }

        [data-theme="minimal"] .progress-bar {
            background: #000;
            border-radius: 0;
        }

        [data-theme="minimal"] .progress-wrapper #progressText {
            color: #000;
            font-family: monospace;
            font-size: 1rem;
        }

        [data-theme="minimal"] .media-card {
            background: #fff;
            border: 1px solid var(--border-color);
            color: #000 !important;
            border-radius: 0;
        }

        [data-theme="minimal"] .media-card:hover {
            border-color: #000;
            background: #f9f9f9;
        }

        [data-theme="minimal"] #floatingTimer {
            background: #fff;
            border: 2px solid #000;
            color: #000;
            box-shadow: 4px 4px 0 #000;
            border-radius: 0;
            font-family: monospace;
        }

        [data-theme="minimal"] #floatingTimer.done {
            background: #000;
            color: #fff;
            box-shadow: none;
        }

        [data-theme="minimal"] .audio-list-item {
            background: #fff;
            border: 1px solid var(--border-color);
            color: #000;
            border-radius: 0;
        }

        [data-theme="minimal"] .audio-list-item:hover {
            border-color: #000;
        }

        [data-theme="minimal"] footer {
            font-family: monospace;
        }

        [data-theme="minimal"] footer a {
            color: #000;
            text-decoration: underline;
        }

        [data-theme="minimal"] .btn-close {
            filter: none;
        }

        [data-theme="minimal"] .dropdown-menu {
            background: #fff;
            border: 1px solid var(--border-color) !important;
            border-radius: 0;
        }

        [data-theme="minimal"] .dropdown-item {
            color: #000;
            border-radius: 0;
            font-family: monospace;
        }

        [data-theme="minimal"] .dropdown-item:hover,
        [data-theme="minimal"] .dropdown-item.active {
            background: #f0f0f0;
        }
    </style>
</head>

<body>

    <div class="container mx-auto px-3" style="max-width: 600px;">

        <header class="dashboard-header animate__animated animate__fadeInDown">
            <div class="brand-logo">FITFORGE</div>
            <div class="d-flex gap-2 align-items-center">

                <div class="dropdown">
                    <button class="btn-action dropdown-toggle" type="button" id="themeDropdown"
                        data-bs-toggle="dropdown" aria-expanded="false" aria-label="Select Theme">
                        <i class="fa-solid fa-swatchbook"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow-sm" aria-labelledby="themeDropdown">
                        <li><a class="dropdown-item theme-select" href="#" data-theme-val="flat">Flat Dark</a></li>
                        <li><a class="dropdown-item theme-select" href="#" data-theme-val="clay">White Clay</a></li>
                        <li><a class="dropdown-item theme-select" href="#" data-theme-val="brutal">Neo Brutal</a></li>
                        <li><a class="dropdown-item theme-select" href="#" data-theme-val="minimal">Minimal</a></li>
                    </ul>
                </div>

                <button class="btn-action" id="voiceToggle" onclick="toggleVoice()" aria-label="Toggle Voice Cues"><i
                        class="fa-solid fa-volume-xmark"></i></button>
                <button class="btn-action" onclick="shareApp()"><i class="fa-solid fa-share-nodes"></i></button>
                <button class="btn-action" data-bs-toggle="modal" data-bs-target="#weeklyModal"><i
                        class="fa-solid fa-calendar-week"></i></button>
            </div>
        </header>

        <div class="mb-4 animate__animated animate__fadeIn">
            <h6 class="text-uppercase text-muted" style="letter-spacing: 2px; font-size: 0.8rem; font-weight: 700;">//
                <span id="currentDay"></span>
            </h6>
            <h2 class="brand-font mt-1" id="focusArea" style="font-size: 1.6rem; color: var(--text-main);">LOADING...
            </h2>
        </div>

        <div class="progress-wrapper animate__animated animate__fadeIn" id="progressContainer" style="display:none;">
            <div class="d-flex justify-content-between mb-2 text-muted"
                style="font-size: 0.85rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;">
                <span>PROGRESS</span>
                <span id="progressText">0%</span>
            </div>
            <div class="progress">
                <div class="progress-bar" id="workoutProgress" role="progressbar" style="width: 0%"></div>
            </div>
        </div>

        <div id="workoutContent"></div>

        <h5 class="mt-5 mb-4 brand-font text-center text-muted animate__animated animate__fadeIn"
            style="font-size: 1rem; letter-spacing: 2px;">THE ZONE</h5>
        <div class="row g-2 mb-5 pb-4 animate__animated animate__fadeInUp">
            <div class="col-6"><button class="media-card spotify" onclick="openAudioModal('playlists')"><i
                        class="fa-brands fa-spotify fa-2x mb-2"></i><span>Music</span></button></div>
            <div class="col-6"><button class="media-card podcast" onclick="openAudioModal('podcasts')"><i
                        class="fa-solid fa-podcast fa-2x mb-2"></i><span>Podcasts</span></button></div>
        </div>
    </div>

    <div id="floatingTimer" onclick="dismissTimer()"><i class="fa-solid fa-stopwatch"></i> <span
            id="timerDisplay">00:00</span></div>

    <div class="modal fade" id="weeklyModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title brand-font fs-6">PROTOCOL OVERVIEW</h5><button type="button"
                        class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="weeklyContent" style="font-size: 0.9rem; line-height: 1.6;"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="audioModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header d-flex flex-column align-items-start">
                    <div class="d-flex justify-content-between w-100 mb-3">
                        <h5 class="modal-title brand-font fs-6" id="audioModalTitle">AUDIO</h5><button type="button"
                            class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="w-100 p-2 rounded"
                        style="background: rgba(128,128,128,0.1); border: var(--border-card);">
                        <div class="btn-group w-100" role="group" id="deviceToggleGroup">
                            <input type="radio" class="btn-check" name="deviceToggle" id="btnIphone" value="ios"
                                checked><label class="btn btn-outline-secondary btn-sm"
                                style="border-radius: var(--radius-btn) 0 0 var(--radius-btn);" for="btnIphone"><i
                                    class="fa-brands fa-apple"></i> iOS</label>
                            <input type="radio" class="btn-check" name="deviceToggle" id="btnAndroid"
                                value="android"><label class="btn btn-outline-secondary btn-sm"
                                style="border-radius: 0;" for="btnAndroid"><i class="fa-brands fa-android"></i>
                                Android</label>
                            <input type="radio" class="btn-check" name="deviceToggle" id="btnWeb" value="web"><label
                                class="btn btn-outline-secondary btn-sm"
                                style="border-radius: 0 var(--radius-btn) var(--radius-btn) 0;" for="btnWeb"><i
                                    class="fa-solid fa-globe"></i> Web</label>
                        </div>
                    </div>
                </div>
                <div class="modal-body" id="audioModalList"></div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container d-flex justify-content-center align-items-center">
            <img src="Personality.svg" alt="Avatar" class="footer-avatar" onerror="this.style.display='none'">
            <span>DESIGNED BY <a href="https://bikkina.vercel.app" target="_blank">ITSMERAMC</a></span>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // --- 1. THEME INITIALIZATION & LOGIC ---
        const themeMeta = document.getElementById('themeColorMeta');
        let currentTheme = localStorage.getItem('fitforge_theme') || 'flat';

        function applyTheme(theme) {
            document.body.setAttribute('data-theme', theme === 'flat' ? '' : theme);
            currentTheme = theme;

            // Update Meta Tag for Mobile Browsers
            const metaColors = { 'flat': '#0a0a0a', 'clay': '#e0e5ec', 'brutal': '#f4f0ea', 'minimal': '#fcfcfc' };
            themeMeta.setAttribute('content', metaColors[theme]);

            // Update Dropdown Active State
            $('.theme-select').removeClass('active');
            $(`.theme-select[data-theme-val="${theme}"]`).addClass('active');

            localStorage.setItem('fitforge_theme', theme);
        }

        applyTheme(currentTheme);

        $('.theme-select').on('click', function (e) {
            e.preventDefault();
            applyTheme($(this).data('theme-val'));
        });

        // --- 2. CORE APP LOGIC ---
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(err => console.log('SW fail')); }); }

        let appData = null; let currentAudioType = 'playlists'; let totalTasks = 0; let timerInterval;
        const todayDateStr = new Date().toDateString();
        let savedState = JSON.parse(localStorage.getItem('fitforge_state')) || {};

        if (savedState.date !== todayDateStr || !savedState.checkedSets) {
            let existingVoice = savedState.voiceEnabled || false;
            savedState = { date: todayDateStr, checkedSets: {}, finisherDone: false, hasCelebrated: false, voiceEnabled: existingVoice };
            localStorage.setItem('fitforge_state', JSON.stringify(savedState));
        }

        $(document).ready(function () {
            if (savedState.voiceEnabled) { $('#voiceToggle').addClass('active').find('i').removeClass('fa-volume-xmark').addClass('fa-volume-high'); }
            fetch('data.json').then(res => res.json()).then(data => { appData = data; initApp(); }).catch(err => { $('#workoutContent').html(`<div class="alert alert-danger" style="border-radius:0;">Server/Vercel required to fetch data.json</div>`); });
            $('input[name="deviceToggle"]').on('change', function () { if (appData) renderAudioList(currentAudioType); });

            $(document).on('click', '.set-bubble', function () {
                let exId = $(this).data('ex'); let setIdx = $(this).data('set'); let restTime = $(this).data('rest');
                let $card = $(this).closest('.workout-card');

                if ($(this).hasClass('active')) {
                    $(this).removeClass('active'); savedState.checkedSets[exId] = savedState.checkedSets[exId].filter(s => s !== setIdx);
                } else {
                    $(this).addClass('active'); savedState.checkedSets[exId].push(setIdx); startRestTimer(restTime);
                }

                if (savedState.checkedSets[exId].length === $card.find('.set-bubble').length) { $card.addClass('completed-card'); } else { $card.removeClass('completed-card'); }
                calculateProgress(true);
            });

            $(document).on('change', '#finisherToggle', function () {
                savedState.finisherDone = this.checked;
                if (this.checked) { $('#card-finisher').addClass('completed-card'); } else { $('#card-finisher').removeClass('completed-card'); }
                calculateProgress(true);
            });
        });

        function toggleVoice() {
            savedState.voiceEnabled = !savedState.voiceEnabled; localStorage.setItem('fitforge_state', JSON.stringify(savedState));
            const $icon = $('#voiceToggle i');
            if (savedState.voiceEnabled) {
                $('#voiceToggle').addClass('active'); $icon.removeClass('fa-volume-xmark').addClass('fa-volume-high');
                let speech = new SpeechSynthesisUtterance(""); window.speechSynthesis.speak(speech);
            } else {
                $('#voiceToggle').removeClass('active'); $icon.removeClass('fa-volume-high').addClass('fa-volume-xmark');
            }
        }

        function buildCardHTML(ex, exId, index, bubblesHtml, isExComplete, isOptional) {
            let optBadge = isOptional ? `<span class="badge bg-secondary opt-badge me-2">OPT</span>` : '';
            return `
                <div class="workout-card animate__animated animate__fadeInUp ${isExComplete ? 'completed-card' : ''}" id="card-${exId}" style="animation-delay: ${index * 0.1}s;">
                    <div class="ex-header"><h3 class="ex-title">${optBadge}${ex.name}</h3><span class="badge bg-dark">${ex.sets}x${ex.reps}</span></div>
                    <div class="set-container">${bubblesHtml}</div>
                    <div class="anatomy-toggle" onclick="$(this).next('.anatomy-content').slideToggle(200);"><i class="fa-solid fa-dna me-2"></i> SCIENCE</div>
                    <div class="anatomy-content">${ex.anatomy_pov}</div>
                    <div class="machine-alt"><i class="fa-solid fa-repeat me-1"></i> ALT: ${ex.machine_alternative}</div>
                </div>
            `;
        }

        function initApp() {
            const daysProper = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const todayName = daysProper[new Date().getDay()];
            $('#currentDay').text(todayName);

            const todaysPlan = appData.schedule.find(day => day.day_of_week === todayName);
            $('#focusArea').text(todaysPlan.focus);
            const $content = $('#workoutContent');

            if (todaysPlan.is_rest_day) {
                $content.append(`<div class="workout-card text-center py-5 animate__animated animate__zoomIn"><i class="fa-solid fa-battery-half fa-3x mb-4 text-muted"></i><h3 class="brand-font mb-3">RECOVERY</h3><p class="px-3 mb-0 text-muted" style="line-height:1.6;">${todaysPlan.notes}</p></div>`);
            } else {
                $('#progressContainer').show();
                totalTasks = 0;

                todaysPlan.exercises.forEach((ex, index) => {
                    let exId = `ex${index}`;
                    if (!savedState.checkedSets[exId]) savedState.checkedSets[exId] = [];
                    let isExComplete = savedState.checkedSets[exId].length === ex.sets;

                    let bubblesHtml = '';
                    for (let s = 0; s < ex.sets; s++) {
                        totalTasks++;
                        let isActive = savedState.checkedSets[exId].includes(s) ? 'active' : '';
                        bubblesHtml += `<div class="set-bubble ${isActive}" data-ex="${exId}" data-set="${s}" data-rest="${ex.rest_seconds || 60}">${s + 1}</div>`;
                    }
                    $content.append(buildCardHTML(ex, exId, index, bubblesHtml, isExComplete, false));
                });

                if (todaysPlan.optional_exercises && todaysPlan.optional_exercises.length > 0) {
                    $content.append(`
                        <div class="text-center mt-4 mb-4 animate__animated animate__fadeInUp" style="animation-delay: 0.3s;">
                            <button class="btn-action mx-auto" style="border-radius: 20px; padding: 8px 20px; font-weight:600;" type="button" data-bs-toggle="collapse" data-bs-target="#optionalWorkouts">
                                OPTIONAL VOLUME <i class="fa-solid fa-chevron-down ms-2"></i>
                            </button>
                        </div>
                        <div class="collapse" id="optionalWorkouts"></div>
                    `);

                    const $optionalContainer = $('#optionalWorkouts');
                    todaysPlan.optional_exercises.forEach((ex, index) => {
                        let exId = `opt${index}`;
                        if (!savedState.checkedSets[exId]) savedState.checkedSets[exId] = [];
                        let isExComplete = savedState.checkedSets[exId].length === ex.sets;

                        let bubblesHtml = '';
                        for (let s = 0; s < ex.sets; s++) {
                            let isActive = savedState.checkedSets[exId].includes(s) ? 'active' : '';
                            bubblesHtml += `<div class="set-bubble ${isActive}" data-ex="${exId}" data-set="${s}" data-rest="${ex.rest_seconds || 60}">${s + 1}</div>`;
                        }
                        $optionalContainer.append(buildCardHTML(ex, exId, index, bubblesHtml, isExComplete, true));
                    });
                }

                if (todaysPlan.finisher) {
                    totalTasks++;
                    let isChecked = savedState.finisherDone ? 'checked' : '';
                    $content.append(`
                        <div class="workout-card animate__animated animate__fadeInUp ${savedState.finisherDone ? 'completed-card' : ''} mt-4" id="card-finisher" style="animation-delay: 0.5s;">
                            <h6 class="text-uppercase mb-4" style="font-size: 0.9rem; letter-spacing: 1px; font-weight: 700;"><i class="fa-solid fa-fire me-2"></i> BURNOUT FINISHER</h6>
                            <label class="finisher-label"><input type="checkbox" class="finisher-checkbox" id="finisherToggle" ${isChecked}><span class="flex-grow-1">${todaysPlan.finisher.name}</span><span class="badge bg-dark">${todaysPlan.finisher.duration_minutes ? todaysPlan.finisher.duration_minutes + ' MIN' : todaysPlan.finisher.sets + 'x' + todaysPlan.finisher.reps}</span></label>
                            <div class="machine-alt mt-4"><i class="fa-solid fa-repeat me-1"></i> ALT: ${todaysPlan.finisher.machine_alternative}</div>
                        </div>
                    `);
                }

                calculateProgress(false);
            }

            const $weekly = $('#weeklyContent');
            appData.schedule.forEach(day => {
                let isToday = day.day_of_week === todayName ? '<span class="badge bg-dark ms-2" style="font-size:0.6rem;">TODAY</span>' : '';
                let dayHtml = `<div class="mb-4 pb-3" style="border-bottom: var(--border-card);"><strong class="d-block mb-2" style="font-size:1.1rem; text-transform:uppercase;">${day.day_of_week} ${isToday}<br><span style="color: var(--text-muted); font-size: 0.85rem; font-weight:600;">${day.focus}</span></strong>`;
                if (day.is_rest_day) {
                    dayHtml += `<span style="font-size: 0.85rem; font-family: var(--font-secondary);">Active Recovery</span>`;
                } else {
                    let optText = day.optional_exercises ? ` <span style="color:var(--text-muted);">(+${day.optional_exercises.length} OPT)</span>` : '';
                    dayHtml += `<span style="font-size: 0.85rem; font-family: var(--font-secondary);">${day.exercises.map(ex => ex.name).join(', ')}${optText}</span>`;
                }
                $weekly.append(dayHtml + `</div>`);
            });
        }

        function calculateProgress(triggerAnimation) {
            let completedSetsCount = 0;
            for (const exId in savedState.checkedSets) { completedSetsCount += savedState.checkedSets[exId].length; }
            if (savedState.finisherDone) completedSetsCount++;
            let percentage = totalTasks === 0 ? 0 : Math.min(100, Math.round((completedSetsCount / totalTasks) * 100));

            $('#workoutProgress').css('width', percentage + '%');

            if (percentage === 100) {
                if (triggerAnimation && !savedState.hasCelebrated) { triggerConfetti(); savedState.hasCelebrated = true; }
                $('#progressText').text("COMPLETE");
                $('.progress-wrapper').addClass('is-complete');
            } else {
                savedState.hasCelebrated = false;
                $('#progressText').text(percentage + '%');
                $('.progress-wrapper').removeClass('is-complete');
            }
            localStorage.setItem('fitforge_state', JSON.stringify(savedState));
        }

        function startRestTimer(seconds) {
            clearInterval(timerInterval);
            const $timer = $('#floatingTimer'); const $display = $('#timerDisplay');
            $timer.removeClass('done').addClass('show');
            let timeLeft = seconds;

            let initM = Math.floor(timeLeft / 60).toString().padStart(2, '0'); let initS = (timeLeft % 60).toString().padStart(2, '0');
            $display.text(`${initM}:${initS}`);

            timerInterval = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft / 60).toString().padStart(2, '0'); let s = (timeLeft % 60).toString().padStart(2, '0');
                $display.text(`${m}:${s}`);

                if (timeLeft <= 0) {
                    clearInterval(timerInterval); $timer.addClass('done'); $display.text("LIFT");
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                    if (savedState.voiceEnabled && 'speechSynthesis' in window) {
                        let speech = new SpeechSynthesisUtterance("Rest over.");
                        speech.volume = 1; speech.rate = 1.1; speech.pitch = 1; window.speechSynthesis.speak(speech);
                    }
                    setTimeout(() => $timer.removeClass('show'), 5000);
                }
            }, 1000);
        }

        function dismissTimer() { $('#floatingTimer').removeClass('show'); clearInterval(timerInterval); }

        function triggerConfetti() {
            let cColors = ['#00ff88', '#ffffff', '#eab308'];
            if (currentTheme === 'brutal') cColors = ['#000000', '#00e676', '#ffd600', '#ff5252', '#448aff'];
            if (currentTheme === 'minimal') cColors = ['#000000', '#ffffff', '#888888'];

            var duration = 3000; var animationEnd = Date.now() + duration; var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 9999, colors: cColors };
            function randomInRange(min, max) { return Math.random() * (max - min) + min; }
            var interval = setInterval(function () { var timeLeft = animationEnd - Date.now(); if (timeLeft <= 0) return clearInterval(interval); var particleCount = 50 * (timeLeft / duration); confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } })); confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } })); }, 250);
        }

        function createDeepLink(webUrl, device) { if (device === 'web') return webUrl; try { const urlObj = new URL(webUrl); const pathParts = urlObj.pathname.split('/').filter(p => p); if (pathParts.length >= 2) { const type = pathParts[0]; const id = pathParts[1]; if (device === 'ios') return `spotify:${type}:${id}`; if (device === 'android') return `intent://${type}/${id}#Intent;scheme=spotify;package=com.spotify.music;end;`; } } catch (e) { console.error(e); } return webUrl; }
        function openAudioModal(type) { currentAudioType = type; $('#audioModalTitle').html(type === 'playlists' ? 'PLAYLISTS' : 'PODCASTS'); renderAudioList(type); new bootstrap.Modal(document.getElementById('audioModal')).show(); }
        function renderAudioList(type) { const $list = $('#audioModalList').empty(); const device = $('input[name="deviceToggle"]:checked').val(); appData.audio[type].forEach(item => { const icon = type === 'playlists' ? 'fa-music' : 'fa-microphone-lines'; $list.append(`<a href="${createDeepLink(item.url, device)}" class="audio-list-item" target="_blank"><i class="fa-solid ${icon} me-3 text-muted"></i><span class="flex-grow-1">${item.name}</span><i class="fa-solid fa-arrow-up-right-from-square text-muted" style="font-size: 0.8rem;"></i></a>`); }); }
        function shareApp() { if (navigator.share) navigator.share({ title: 'FitForge Protocol', text: 'Check out my custom daily protocol.', url: window.location.href }).catch(console.error); else alert("Copy this link: " + window.location.href); }
    </script>
